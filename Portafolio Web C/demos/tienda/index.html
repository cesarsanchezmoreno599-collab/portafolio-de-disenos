<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marketplace Demo</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<h1 class="logo">MarketPlace</h1>

<input type="text" id="buscador" placeholder="Buscar productos...">

<div class="carrito-icono" onclick="toggleCarrito()">
🛒 <span id="contador">0</span>
</div>

</header>


<section class="filtros">

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('tecnologia')">Tecnología</button>
<button onclick="filtrar('hogar')">Hogar</button>
<button onclick="filtrar('ropa')">Ropa</button>

</section>


<main class="productos" id="productos"></main>


<aside class="carrito" id="carrito">

<h2>Carrito</h2>

<ul id="listaCarrito"></ul>

<p class="total">Total: $<span id="total">0</span></p>

<button onclick="vaciarCarrito()">Vaciar carrito</button>

</aside>


<script src="script.js"></script>

</body>
</html>
